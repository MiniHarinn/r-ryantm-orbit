version: "3"

vars:
  DIST_DIR: dist
  PORT: "8080"

silent: false

tasks:
  fetch:
    desc: Fetch and parse logs into data.json
    cmds:
      - nix develop --command go run ./cmd/fetchdata -out {{.DIST_DIR}} -workers 64 -index-workers 64 -verbose

  fetch-rapid:
    desc: Fetch and parse logs into data.json (Rapid)
    cmds:
      - nix develop --command go run ./cmd/fetchdata -out {{.DIST_DIR}} -workers 256 -index-workers 256 -verbose

  build:
    desc: Build site from existing index.json
    cmds:
      - nix develop --command go run ./cmd/sitebuild -out {{.DIST_DIR}} -data {{.DIST_DIR}}/index.json -verbose

  all:
    desc: Fetch data then build site
    cmds:
      - task: fetch
      - task: build

  serve:
    desc: Serve dist/ via Caddy on :8080
    cmds:
      - nix develop --command caddy file-server --root {{.DIST_DIR}} --listen :{{.PORT}}

  clean:
    desc: Remove generated output
    cmds:
      - rm -rf {{.DIST_DIR}}
